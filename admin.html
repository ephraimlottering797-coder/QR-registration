 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Future Focus Day — Admin | Orbit TVET College</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper admin-page">

    <header class="hero admin-hero">

      <!-- COLLEGE LOGO & NAME -->
      <div class="college-brand">
        <img src="logo.png" alt="Orbit TVET College Logo" class="college-logo" />
        <div class="college-name">
          <span class="college-title">Orbit TVET College</span>
          <span class="college-sub">Empowering Through Education</span>
        </div>
      </div>

      <div class="hero-divider"></div>

      <h1 class="hero-title">
        <span class="hero-highlight">Future Focus Day</span>
      </h1>
      <p class="hero-sub">Registered Students Dashboard</p>
      <div class="seat-tracker">
        <div class="seat-bar-wrap">
          <div class="seat-bar" id="seat-bar"></div>
        </div>
        <p class="seat-label">
          <span id="seat-count">0</span> / 200 registered
        </p>
      </div>
    </header>

    <main class="admin-main">

      <!-- CONTROLS -->
      <div class="admin-controls">
        <input type="text" id="searchInput" placeholder="🔍 Search by name, number or program…" oninput="renderTable()" />
        <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
        <button class="btn-clear" onclick="clearAll()">🗑 Clear All Data</button>
      </div>

      <!-- TABLE -->
      <div class="table-wrap">
        <table id="studentTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Student Number</th>
              <th>Full Name</th>
              <th>Program</th>
              <th>Registered At</th>
            </tr>
          </thead>
          <tbody id="tableBody">
          </tbody>
        </table>
        <div id="empty-state" class="empty-state hidden">
          No students registered yet.
        </div>
      </div>

      <a href="index.html" class="admin-link" style="text-align:center; display:block; margin-top:2rem;">
        ← Back to Registration
      </a>
    </main>

    <footer class="page-footer">
      <img src="logo.png" alt="" class="footer-logo" />
      Orbit TVET College &nbsp;|&nbsp; Future Focus Day
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      updateCounter();
      renderTable();
    });
  </script>
</body>
</html>
